name: Release binaries

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and release Windows binaries
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          series_prefix="v1.0"
          latest_tag="$(git tag --list "${series_prefix}.*" --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_patch=0
          elif [[ "$latest_tag" =~ ^${series_prefix}\.([0-9]+)$ ]]; then
            next_patch=$((${BASH_REMATCH[1]} + 1))
          else
            echo "Unexpected release tag format: $latest_tag" >&2
            exit 1
          fi

          tag="${series_prefix}.${next_patch}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc

      - name: Build MSYS2 UCRT64 binary
        shell: msys2 {0}
        run: |
          make -f Makefile.mingw clean
          make -f Makefile.mingw
          mv rmtrash.exe rmtrash-msys2-ucrt64.exe
          make -f Makefile.mingw clean

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build getopt helper for MSVC
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/aont/getopt-msvc-helper.git %RUNNER_TEMP%\getopt-msvc-helper
          cd /d %RUNNER_TEMP%\getopt-msvc-helper
          nmake /f Makefile

      - name: Build MSVC binary
        shell: cmd
        run: |
          call %RUNNER_TEMP%\getopt-msvc-helper\setup-env.cmd
          nmake /f Makefile.msvc clean
          nmake /f Makefile.msvc
          move rmtrash.exe rmtrash-msvc-x64.exe
          nmake /f Makefile.msvc clean

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          gh release create "$TAG_NAME" \
            rmtrash-msys2-ucrt64.exe \
            rmtrash-msvc-x64.exe \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes "Automated release for commit $GITHUB_SHA."
