name: Release binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msys2-ucrt64:
    name: Build MSYS2 UCRT64 GCC binary
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc

      - name: Build
        run: make -f Makefile.mingw

      - name: Stage binary
        run: |
          mkdir -p dist
          cp rmtrash.exe dist/rmtrash-msys2-ucrt64-gcc.exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtrash-msys2-ucrt64-gcc
          path: dist/rmtrash-msys2-ucrt64-gcc.exe
          if-no-files-found: error

  build-msvc:
    name: Build MSVC binary
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare getopt-msvc-helper
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/aont/getopt-msvc-helper.git "%RUNNER_TEMP%\getopt-msvc-helper"
          echo INCLUDE=%INCLUDE%;%RUNNER_TEMP%\getopt-msvc-helper\include>>%GITHUB_ENV%
          echo LIB=%LIB%;%RUNNER_TEMP%\getopt-msvc-helper\lib>>%GITHUB_ENV%

      - name: Build
        shell: cmd
        run: nmake /f Makefile.msvc

      - name: Stage binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item rmtrash.exe dist/rmtrash-msvc-x64.exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtrash-msvc-x64
          path: dist/rmtrash-msvc-x64.exe
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs:
      - build-msys2-ucrt64
      - build-msvc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Push release tag
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          if ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}"
          fi

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/rmtrash-msys2-ucrt64-gcc.exe
            dist/rmtrash-msvc-x64.exe
